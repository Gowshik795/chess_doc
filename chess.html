<!DOCTYPE html>
<html>
<head>
<title>Chess</title>
<style>
body { font-family: Arial; text-align: center; background: #f0d9b5; }
table { border-collapse: collapse; margin: 20px auto; }
td { width: 60px; height: 60px; text-align: center; font-size: 40px; cursor: pointer; border: 1px solid #999; }
.light { background: #f0d9b5; }
.dark { background: #b58863; }
.selected { background: yellow !important; }
.valid { background: lightgreen !important; }
#status { font-size: 24px; font-weight: bold; }
#check { color: red; font-size: 28px; font-weight: bold; }
button { padding: 10px 20px; font-size: 18px; }
</style>
</head>
<body>
<h1>Simple Chess</h1>
<div id="status">White's turn</div>
<div id="check"></div>
<table id="board"></table>
<button onclick="resetBoard()">Reset</button>

<script>
const pieces = {
  'r':'♜','n':'♞','b':'♝','q':'♛','k':'♚','p':'♟',
  'R':'♖','N':'♘','B':'♗','Q':'♕','K':'♔','P':'♙'
};

let board = [
 ['r','n','b','q','k','b','n','r'],
 ['p','p','p','p','p','p','p','p'],
 [null,null,null,null,null,null,null,null],
 [null,null,null,null,null,null,null,null],
 [null,null,null,null,null,null,null,null],
 [null,null,null,null,null,null,null,null],
 ['P','P','P','P','P','P','P','P'],
 ['R','N','B','Q','K','B','N','R']
];

let turn = 'white';
let selected = null;

function render() {
  let table = document.getElementById('board');
  table.innerHTML = '';
  for(let row=0; row<8; row++) {
    let tr = document.createElement('tr');
    for(let col=0; col<8; col++) {
      let td = document.createElement('td');
      td.className = ((row+col)%2==0) ? 'light' : 'dark';
      td.dataset.row = row;
      td.dataset.col = col;
      let pieceCode = board[row][col];
      if(pieceCode) td.innerHTML = pieces[pieceCode];
      td.onclick = () => click(row, col);
      tr.appendChild(td);
    }
    table.appendChild(tr);
  }
  document.getElementById('status').textContent = turn.charAt(0).toUpperCase() + turn.slice(1) + "'s turn";
  let checkEl = document.getElementById('check');
  let inCheck = isInCheck(turn);
  checkEl.textContent = inCheck ? 'CHECK!' : '';
  if(selected) {
    let selCell = document.querySelector(`td[data-row="${selected.row}"][data-col="${selected.col}"]`);
    if(selCell) selCell.classList.add('selected');
  }
}

function click(row, col) {
  document.querySelectorAll('td').forEach(td => td.classList.remove('selected', 'valid'));
  
  let piece = board[row][col];
  
  if(selected) {
    if(isValidMove(selected.row, selected.col, row, col)) {
      board[row][col] = board[selected.row][selected.col];
      board[selected.row][selected.col] = null;
      turn = turn === 'white' ? 'black' : 'white';
    }
    selected = null;
  } else if(piece && ((turn === 'white' && piece.toUpperCase() === piece) || (turn === 'black' && piece.toLowerCase() === piece))) {
    selected = {row, col};
    highlightValidMoves(row, col);
  }
  
  render();
}

function isValidMove(fr, fc, tr, tc) {
  let piece = board[fr][fc];
  let target = board[tr][tc];
  
  if(!piece || (turn === 'white' && piece.toLowerCase() === piece) || (turn === 'black' && piece.toUpperCase() === piece)) return false;
  if(target && ((turn === 'white' && target.toLowerCase() === target) || (turn === 'black' && target.toUpperCase() === target))) return false;
  
  let dr = tr - fr;
  let dc = tc - fc;
  
  let type = piece.toLowerCase();
  
  if(type === 'p') {
    let dir = turn === 'white' ? -1 : 1;
    let start = turn === 'white' ? 6 : 1;
    if(dc === 0 && !target) {
      if(dr === dir || (dr === dir*2 && fr === start)) return true;
    }
    if(Math.abs(dc) === 1 && dr === dir && target) return true;
    return false;
  }
  
  if(type === 'n') return (Math.abs(dr) === 2 && Math.abs(dc) === 1) || (Math.abs(dr) === 1 && Math.abs(dc) === 2);
  if(type === 'k') return Math.abs(dr) <= 1 && Math.abs(dc) <= 1;
  
  if(type === 'r') {
    if(dr !== 0 && dc !== 0) return false;
    return clearPath(fr,fc,tr,tc);
  }
  if(type === 'b') {
    if(Math.abs(dr) !== Math.abs(dc)) return false;
    return clearPath(fr,fc,tr,tc);
  }
  if(type === 'q') {
    if(dr !== 0 && dc !== 0 && Math.abs(dr) !== Math.abs(dc)) return false;
    return clearPath(fr,fc,tr,tc);
  }
  return false;
}

function clearPath(fr,fc,tr,tc) {
  let dr = Math.sign(tr-fr);
  let dc = Math.sign(tc-fc);
  let r = fr + dr;
  let c = fc + dc;
  while(r !== tr || c !== tc) {
    if(board[r][c]) return false;
    r += dr;
    c += dc;
  }
  return true;
}

function highlightValidMoves(row, col) {
  for(let r=0; r<8; r++) {
    for(let c=0; c<8; c++) {
      if(isValidMove(row, col, r, c)) {
        let td = document.querySelector(`td[data-row="${r}"][data-col="${c}"]`);
        if(td) td.classList.add('valid');
      }
    }
  }
}

function findKing(color) {
  let king = color === 'white' ? 'K' : 'k';
  for(let r=0; r<8; r++) for(let c=0; c<8; c++) if(board[r][c] === king) return {row:r, col:c};
}

function isInCheck(color) {
  let opp = color === 'white' ? 'black' : 'white';
  let king = findKing(color);
  for(let r=0; r<8; r++) {
    for(let c=0; c<8; c++) {
      let piece = board[r][c];
      if(piece && ((opp === 'white' && piece.toUpperCase() === piece) || (opp === 'black' && piece.toLowerCase() === piece))) {
        if(isValidMove(r, c, king.row, king.col)) return true;
      }
    }
  }
  return false;
}

function resetBoard() {
  board = [
   ['r','n','b','q','k','b','n','r'],
   ['p','p','p','p','p','p','p','p'],
   [null,null,null,null,null,null,null,null],
   [null,null,null,null,null,null,null,null],
   [null,null,null,null,null,null,null,null],
   [null,null,null,null,null,null,null,null],
   ['P','P','P','P','P','P','P','P'],
   ['R','N','B','Q','K','B','N','R']
  ];
  turn = 'white';
  selected = null;
  render();
}

render();
</script>
</body>
</html>
